name: Recover RCPL-X5V model weights v2

on:
  pull_request:
    paths:
      - '.github/workflows/recover-x5v-weights-v2.yml'
  push:
    paths:
      - '.github/workflows/recover-x5v-weights-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  ARTIFACT_URL: https://litter.catbox.moe/hqzgjq.zip
  EXPECTED_SHA256: db23b5f8c19c7d70ea05486fa73841e55ea71014aa14e88b517cd444fff26f2a
  FILE_NAME: rcpl_x5v_model_weights_recovered_20260723_v2.zip

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Download and verify regenerated model weights
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-all-errors \
            -A 'Mozilla/5.0' \
            --output "$FILE_NAME" "$ARTIFACT_URL"
          echo "$EXPECTED_SHA256  $FILE_NAME" | sha256sum --check --strict
          unzip -t "$FILE_NAME"
      - name: Upload verified workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rcpl-x5v-model-weights-recovered-v2
          path: rcpl_x5v_model_weights_recovered_20260723_v2.zip
          if-no-files-found: error
          retention-days: 1
