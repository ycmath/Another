name: Recover RCPL-X5V artifact

on:
  push:
    paths:
      - '.github/workflows/recover-x5v-artifact.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  ARTIFACT_URL: https://litter.catbox.moe/20r3wy.zip
  EXPECTED_SHA256: ebfdfc4352a75fb000ada4efcc024c16e99da4bf525814d3c9016834b8a7b66e

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Download and verify frozen result
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 --output rcpl_x5v_real_video_20260723_v1.zip "$ARTIFACT_URL"
          echo "$EXPECTED_SHA256  rcpl_x5v_real_video_20260723_v1.zip" | sha256sum --check --strict
          unzip -t rcpl_x5v_real_video_20260723_v1.zip
      - name: Upload verified workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rcpl-x5v-real-video-result
          path: rcpl_x5v_real_video_20260723_v1.zip
          if-no-files-found: error
          retention-days: 3
